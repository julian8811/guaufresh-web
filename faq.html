<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Preguntas Frecuentes | Guaufresh</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="style.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "primary-dark": "#0fae0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 lg:px-12">
        <a class="flex items-center gap-3" href="index.html">
            <span class="material-symbols-outlined text-primary text-3xl">pets</span>
            <h2 class="text-xl font-bold">Guaufresh</h2>
        </a>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12 flex-grow w-full">
        <h1 class="text-4xl font-black mb-12 text-center">Preguntas Frecuentes</h1>

        <div class="space-y-4">
            <details class="group bg-white dark:bg-slate-900 rounded-2xl border border-primary/5 p-6 cursor-pointer">
                <summary class="flex justify-between items-center font-bold list-none">
                    ¿Vuestros productos son realmente 100% veganos?
                    <span
                        class="material-symbols-outlined transition-transform group-open:rotate-180">expand_more</span>
                </summary>
                <div class="pt-4 text-slate-500 text-sm leading-relaxed">
                    Sí, absolutamente. No utilizamos ningún derivado animal ni testamos en animales. Todos nuestros
                    ingredientes son de origen botánico y mineral.
                </div>
            </details>
            <!-- More FAQs... -->
        </div>
    </main>

    <footer class="bg-slate-50 dark:bg-slate-950 py-12 text-center text-gray-500">
        <p>© 2024 Guaufresh. Todos los derechos reservados.</p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
