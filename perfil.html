<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mi Perfil | Guaufresh</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="style.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "primary-dark": "#0fae0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 lg:px-12">
        <a class="flex items-center gap-3" href="index.html">
            <span class="material-symbols-outlined text-primary text-3xl">pets</span>
            <h2 class="text-xl font-bold">Guaufresh</h2>
        </a>
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-sm font-semibold hover:text-primary transition-colors" href="catalogo.html">Tienda</a>
            <a class="text-sm font-semibold hover:text-primary transition-colors"
                href="sobre-nosotros.html">Nosotros</a>
            <a class="text-sm font-semibold hover:text-primary transition-colors" href="blog.html">Blog</a>
            <a class="text-sm font-semibold hover:text-primary transition-colors" href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 flex-grow w-full">
        <h1 class="text-3xl font-black mb-10">Mi Perfil</h1>
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-2">
                <a href="perfil.html" class="block p-4 bg-primary text-slate-900 font-bold rounded-xl">Mis Pedidos</a>
                <a href="direcciones.html"
                    class="block p-4 hover:bg-primary/10 rounded-xl transition-colors">Direcciones</a>
                <a href="favoritos.html"
                    class="block p-4 hover:bg-primary/10 rounded-xl transition-colors">Favoritos</a>
                <a href="configuracion.html"
                    class="block p-4 hover:bg-primary/10 rounded-xl transition-colors">Configuración</a>
            </div>
            <!-- Content -->
            <div class="lg:col-span-3">
                <div class="bg-white dark:bg-slate-900 rounded-3xl p-8 border border-primary/10 shadow-sm">
                    <h2 class="text-xl font-bold mb-6">Historial de Pedidos</h2>
                    <div class="space-y-4">
                        <div
                            class="p-6 border border-slate-100 dark:border-slate-800 rounded-2xl flex justify-between items-center">
                            <div>
                                <p class="font-bold">Pedido #12345</p>
                                <p class="text-sm text-slate-500">22 de Junio, 2024 • 18,50€</p>
                            </div>
                            <span
                                class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">Entregado</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-50 dark:bg-slate-950 py-12 text-center text-gray-500">
        <p>© 2024 Guaufresh. Todos los derechos reservados.</p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
