<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Pasarela de Pago | Guaufresh</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="style.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "primary-dark": "#0fae0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 lg:px-12">
        <a class="flex items-center gap-3 text-slate-900 dark:text-white" href="index.html">
            <span class="material-symbols-outlined text-primary text-3xl">pets</span>
            <h2 class="text-xl font-bold">Guaufresh</h2>
        </a>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        <h1 class="text-3xl font-extrabold mb-10">Pago y Envío</h1>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- Left Panel -->
            <div class="lg:col-span-7 space-y-10">
                <!-- Shipping Form -->
                <section class="space-y-6">
                    <div class="flex items-center gap-3">
                        <span
                            class="flex items-center justify-center size-8 rounded-full bg-primary text-background-dark font-bold text-sm">1</span>
                        <h2 class="text-xl font-bold">Información de Envío</h2>
                    </div>
                    <div
                        class="p-6 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4">
                        <input
                            class="w-full rounded-lg border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900"
                            placeholder="Nombre completo" type="text" />
                        <input
                            class="w-full rounded-lg border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900"
                            placeholder="Dirección" type="text" />
                        <div class="grid grid-cols-2 gap-4">
                            <input
                                class="w-full rounded-lg border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900"
                                placeholder="Ciudad" type="text" />
                            <input
                                class="w-full rounded-lg border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900"
                                placeholder="Código Postal" type="text" />
                        </div>
                    </div>
                </section>
                <!-- Payment Method -->
                <section class="space-y-6">
                    <div class="flex items-center gap-3">
                        <span
                            class="flex items-center justify-center size-8 rounded-full bg-primary text-background-dark font-bold text-sm">2</span>
                        <h2 class="text-xl font-bold">Método de Pago</h2>
                    </div>
                    <div
                        class="p-6 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 space-y-4">
                        <div class="flex items-center gap-4 p-4 border-2 border-primary bg-primary/5 rounded-xl">
                            <span class="material-symbols-outlined text-primary">credit_card</span>
                            <span class="font-bold">Tarjeta de Crédito / Débito</span>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Summary Panel -->
            <div class="lg:col-span-5">
                <div
                    class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm sticky top-28">
                    <h3 class="text-xl font-bold mb-6">Tu Pedido</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between">
                            <span>Subtotal</span>
                            <span>15,90€</span>
                        </div>
                        <div class="flex justify-between font-black text-xl">
                            <span>Total</span>
                            <span>15,90€</span>
                        </div>
                    </div>
                    <a href="confirmacion.html"
                        class="w-full bg-primary hover:bg-primary-dark text-background-dark font-extrabold py-5 rounded-xl transition-all block text-center shadow-lg shadow-primary/20">
                        Finalizar Pedido
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-slate-950 py-12 text-center text-gray-500">
        <p>© 2024 Guaufresh. Todos los derechos reservados.</p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
