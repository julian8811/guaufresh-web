<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Contacto | Guaufresh</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="style.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "primary-dark": "#0fae0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between border-b border-solid border-primary/10 bg-white dark:bg-background-dark px-6 py-4 lg:px-12">
        <a class="flex items-center gap-3" href="index.html">
            <span class="material-symbols-outlined text-primary text-3xl">pets</span>
            <h2 class="text-xl font-bold">Guaufresh</h2>
        </a>
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-sm font-semibold hover:text-primary transition-colors" href="catalogo.html">Tienda</a>
            <a class="text-sm font-semibold hover:text-primary transition-colors"
                href="sobre-nosotros.html">Nosotros</a>
            <a class="text-sm font-semibold hover:text-primary transition-colors" href="blog.html">Blog</a>
            <a class="text-sm font-bold text-primary underline underline-offset-4" href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 flex-grow w-full">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <!-- Form -->
            <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-3xl shadow-sm border border-primary/10">
                <h2 class="text-3xl font-black mb-2">Estamos aquí para ayudarte</h2>
                <p class="text-slate-500 mb-8">Envíanos un mensaje y te responderemos en menos de 24h.</p>
                <form class="space-y-4">
                    <input class="w-full rounded-xl border-primary/10 bg-slate-50 dark:bg-background-dark/50"
                        placeholder="Nombre completo" type="text" />
                    <input class="w-full rounded-xl border-primary/10 bg-slate-50 dark:bg-background-dark/50"
                        placeholder="Email" type="email" />
                    <textarea class="w-full rounded-xl border-primary/10 bg-slate-50 dark:bg-background-dark/50"
                        placeholder="¿En qué podemos ayudarte?" rows="4"></textarea>
                    <button
                        class="w-full bg-primary text-slate-900 font-bold py-4 rounded-xl shadow-lg shadow-primary/20">Enviar
                        mensaje</button>
                </form>
            </div>
            <!-- Info -->
            <div class="flex flex-col justify-center space-y-8">
                <div class="flex items-start gap-4">
                    <div class="size-12 rounded-full bg-primary/20 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined">mail</span>
                    </div>
                    <div>
                        <h4 class="font-bold">Email</h4>
                        <p class="text-slate-500">hola@guaufresh.com</p>
                    </div>
                </div>
                <div class="flex items-start gap-4">
                    <div class="size-12 rounded-full bg-primary/20 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined">schedule</span>
                    </div>
                    <div>
                        <h4 class="font-bold">Horario</h4>
                        <p class="text-slate-500">Lunes a Viernes: 9:00 - 18:00</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-50 dark:bg-slate-950 py-12 text-center text-gray-500">
        <p>© 2024 Guaufresh. Todos los derechos reservados.</p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
