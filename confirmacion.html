<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>¡Pedido Confirmado! | Guaufresh</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="style.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00A79F",
                        "primary-dark": "#0fae0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col items-center justify-center text-center p-6">
    <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-3xl p-10 shadow-xl border border-primary/10">
        <div class="size-20 bg-primary/20 rounded-full flex items-center justify-center text-primary mx-auto mb-6">
            <span class="material-symbols-outlined text-5xl">check_circle</span>
        </div>
        <h1 class="text-3xl font-black mb-4">¡Gracias por tu compra!</h1>
        <p class="text-slate-500 mb-8">Tu pedido ha sido procesado con éxito. Pronto recibirás un email con los detalles
            del envío.</p>
        <div class="flex flex-col gap-3">
            <a href="index.html"
                class="bg-primary text-slate-900 font-bold py-4 rounded-xl shadow-lg shadow-primary/20">Volver al
                Inicio</a>
            <a href="perfil.html" class="text-primary font-bold py-2">Ver mis pedidos</a>
        </div>
    </div>
</body>

</html>
