<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tu Carrito | Guaufresh</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="style.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "primary-dark": "#0fae0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 lg:px-12">
        <a class="flex items-center gap-3 text-slate-900 dark:text-white" href="index.html">
            <span class="material-symbols-outlined text-primary text-3xl">pets</span>
            <h2 class="text-xl font-bold">Guaufresh</h2>
        </a>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full">
        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Shopping Cart Content -->
            <div class="flex-grow">
                <h2 class="text-3xl font-black mb-8">Tu Carrito <span class="text-primary text-lg font-medium ml-2">(2
                        artículos)</span></h2>
                <div class="space-y-6">
                    <!-- Item 1 -->
                    <div
                        class="flex flex-col sm:flex-row items-center gap-6 p-6 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800">
                        <div class="w-24 h-24 bg-primary/5 rounded-lg flex-shrink-0 bg-center bg-cover"
                            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCbd5e-3nCIx-Yb2y7ulrUv39vDCAfYU_eWHvav7aR6NchVpBIxFot4R2OdKCnLTI5NGVFqs4lGdtkSKNQHdwxb42XZKiZYWJ7qx5dhuVb5CyVFhAqi5OoHVWVgZxUw_vnVhKY_908_DJFoeA4S6qjCyQehxbyY3btDxl5Yk0dnQTtG7cUfjhQWwLVvuzHXIsdLBCthXAifa45lhw297P9dYq8wE_F-tIX50vZ34ql8Hv08vCb1Udn2AR9VdEt0ljvlt7wNBhrFA_I')">
                        </div>
                        <div class="flex-grow text-center sm:text-left">
                            <h3 class="font-bold text-lg">Champú Piel Sensible</h3>
                            <p class="text-slate-500 text-sm mb-2">250ml — pH neutro</p>
                            <span class="text-primary font-bold text-xl">15,90€</span>
                        </div>
                        <div class="flex flex-col items-center gap-4">
                            <div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-full px-3 py-1">
                                <button
                                    class="w-8 h-8 flex items-center justify-center hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-sm">remove</span>
                                </button>
                                <span class="px-4 font-bold">1</span>
                                <button
                                    class="w-8 h-8 flex items-center justify-center hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                </button>
                            </div>
                            <button class="flex items-center gap-1 text-xs text-slate-400 hover:text-red-500">
                                <span class="material-symbols-outlined text-sm">delete</span> Eliminar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar Summary -->
            <div class="lg:w-96 shrink-0">
                <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-xl border border-primary/5 sticky top-24">
                    <h3 class="text-xl font-bold mb-6">Resumen del pedido</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-slate-500">
                            <span>Subtotal</span>
                            <span>15,90€</span>
                        </div>
                        <div class="flex justify-between text-slate-500">
                            <span>Envío</span>
                            <span class="text-primary font-medium">Gratis</span>
                        </div>
                        <hr class="border-slate-100 dark:border-slate-800" />
                        <div class="flex justify-between text-xl font-black">
                            <span>Total</span>
                            <span>15,90€</span>
                        </div>
                    </div>
                    <a href="checkout.html"
                        class="w-full bg-primary text-background-dark font-black py-4 rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                        Finalizar Compra
                        <span class="material-symbols-outlined">arrow_forward</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer
        class="bg-slate-50 dark:bg-slate-950 py-12 border-t border-slate-100 dark:border-slate-900 mt-20 text-center">
        <p>© 2024 Guaufresh. Todos los derechos reservados.</p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
